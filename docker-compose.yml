version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: buscot-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - buscot-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buscot-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - MONGODB_URI=mongodb://root:password@mongodb:27017/buscot?authSource=admin
      - JWT_SECRET=your_secret_key_here
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - buscot-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: buscot-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - buscot-network

volumes:
  mongodb_data:

networks:
  buscot-network:
    driver: bridge
